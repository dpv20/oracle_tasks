DRIVER_CLASS_NOT_FOUND       = The application could not find the required Oracle JDBC driver. Please ensure the driver is installed and referenced in your classpath.
DB_CONNECTION_FAILED         = Unable to establish a connection to the Oracle database. Please check your network or database configuration and try again.
DB_CONNECTION_SUCCESS        = Successfully connected to the '%s' database.
DB_DISCONNECTED              = The connection to the database has been closed.
DB_DISCONNECTED_COUNTRY      = The connection to the '%s' database has been closed.
DB_QUERY_EXECUTION_ERROR     = An unexpected error occurred while executing the database query. Please review your request or contact your administrator.
DB_QUERY_SUCCESS             = The database query completed successfully.
DB_UPDATE_FAILED             = The requested update to the database could not be completed. Please try again or contact support.
DB_UPDATE_SUCCESS            = The database record was updated successfully.
DB_INSERT_FAILED             = The application could not add new data to the database. Please check your input and try again.
DB_INSERT_SUCCESS            = New data has been added to the database successfully.
DB_DELETE_FAILED             = The application was unable to delete the selected record from the database. Please verify your permissions and try again.
DB_DELETE_SUCCESS            = The selected record was deleted from the database.
DB_TIMEOUT_ERROR             = The database operation took too long and timed out. Please try again later.

FILE_NOT_FOUND               = The requested file could not be found on the server. It may have been moved or deleted.
FILE_UPLOAD_FAILED           = The file could not be uploaded due to an error. Please try again.
FILE_UPLOAD_SUCCESS          = Your file has been uploaded successfully.
FILE_DOWNLOAD_FAILED         = The system was unable to download the file. Please try again.
FILE_DOWNLOAD_SUCCESS        = The file has been downloaded successfully.
FILE_FORMAT_UNSUPPORTED      = The uploaded file format is not supported. Please use a compatible file format.
FILE_SIZE_EXCEEDED           = The file exceeds the maximum allowed size for upload. Please upload a smaller file.
FILE_PROPERTY_NOT_FOUND 	 = configuration property '%s' is not found in '%s'

ENTERED_DATE_INVALID         = The entered date is invalid. Please ensure the date is in the correct format.
ENTERED_ENVIRONMENT_INVALID  = The specified environment is invalid. Please select a valid environment or verify your input and try again.
EXCEPTION_OCCURRED_MESSAGE   = Exception occurred during processing. Please check the logs in '%s' log path


USER_NOT_FOUND               = No user was found matching the given credentials. Please check your details and try again.
USER_CREATION_FAILED         = There was an issue creating the new user account. Please ensure all required information is provided or try again later.
USER_CREATED_SUCCESS         = The new user account was created successfully.
USER_UPDATE_FAILED           = Unable to update the user profile. Please try again later.
USER_UPDATED_SUCCESS         = User profile updated successfully.
USER_DELETE_FAILED           = The user could not be deleted. Please check if the user is currently in use or try again later.
USER_DELETED_SUCCESS         = The user has been deleted from the system.
USER_AUTH_FAILED             = Login failed. Please verify your username and password and try again.
USER_AUTH_SUCCESS            = You have logged in successfully.
USER_ALREADY_EXISTS          = An account with this email already exists. Please use a different email or reset your password.
UNAUTHORIZED_ACCESS          = You do not have permission to perform this action. If you believe this is an error, please contact your administrator.

INVALID_INPUT                = One or more fields contain invalid information. Please correct the highlighted fields and submit again.
REQUIRED_FIELD_MISSING       = Please complete all required fields before proceeding.
DATA_VALIDATION_FAILED       = Your input does not meet the required criteria. Please review the information and try again.
INPUT_TOO_LONG               = One of your entries exceeds the allowed length. Please shorten your input and retry.
UNSUPPORTED_FORMAT           = The data format provided is not supported. Please use the correct format and try again.

SYSTEM_ERROR                 = An internal system error has occurred. Please refresh the page or contact support if the problem persists.
OPERATION_SUCCESS            = The operation was completed successfully.
OPERATION_FAILED             = The operation could not be completed. Please try again or contact support.
RESOURCE_NOT_FOUND           = The requested resource could not be located. It may have been removed or the link is incorrect.
ACCESS_DENIED                = Access to this resource has been denied. Please contact your administrator for assistance.
SESSION_EXPIRED              = Your session has expired due to inactivity. Please log in again to continue.
SERVICE_UNAVAILABLE          = The system is currently unavailable. Please try again later.
CONFIG_LOAD_ERROR            = An error occurred while loading the application configuration. Please contact your system administrator.
OPERATION_CANCELLED          = The action has been cancelled as requested.